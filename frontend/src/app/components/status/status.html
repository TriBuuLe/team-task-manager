<div class="w-[420px] rounded-xl border border-slate-800 bg-slate-900/80 p-6 shadow-2xl">
  <div class="mb-6">
    <p class="text-xs uppercase tracking-[0.25em] text-slate-500">
      System Console
    </p>
    <h1 class="mt-2 text-2xl font-semibold text-white">
      Team Task Manager
    </h1>
  </div>

  <div class="space-y-4">
    <div class="rounded-lg border border-slate-800 bg-slate-950/70 p-4">
      <p class="text-xs uppercase tracking-wide text-slate-500">
        Backend Response
      </p>
      <p class="mt-2 text-sm font-medium text-slate-200">
        {{ message || 'Waiting for backend...' }}
      </p>
    </div>

    <div class="rounded-lg border border-slate-800 bg-slate-950/70 p-4">
      <p class="text-xs uppercase tracking-wide text-slate-500">
        Health Status
      </p>

      <div class="mt-2 flex items-center gap-2">
        <span
          class="h-2.5 w-2.5 rounded-full"
          [class.bg-emerald-400]="healthStatus === 'OK'"
          [class.bg-red-500]="healthStatus !== 'OK'"
        ></span>

        <span class="text-sm font-semibold text-slate-100">
          {{ healthStatus || 'Checking...' }}
        </span>
      </div>
    </div>

    <div class="rounded-lg border border-slate-800 bg-slate-950/70 p-4">
      <p class="text-xs uppercase tracking-wide text-slate-500">
        Workspaces
      </p>

      <form class="mt-3 flex gap-2" (submit)="createWorkspace()">
        <input
          class="min-w-0 flex-1 rounded-md border border-slate-700 bg-slate-900 px-3 py-2 text-sm text-slate-100 outline-none placeholder:text-slate-500 focus:border-emerald-400"
          type="text"
          name="workspaceName"
          placeholder="Workspace name"
          [(ngModel)]="workspaceName"
        />

        <button
          class="rounded-md bg-emerald-500 px-3 py-2 text-sm font-semibold text-slate-950 disabled:cursor-not-allowed disabled:bg-slate-700 disabled:text-slate-400"
          type="submit"
          [disabled]="!workspaceName.trim()"
        >
          Create
        </button>
      </form>
    
      <div class="mt-3 space-y-2">
        @for (workspace of workspaces; track workspace.id) {
          <div class="rounded-md border border-slate-800 bg-slate-900 px-3 py-2 text-sm text-slate-200">
            {{ workspace.name }}
          </div>
        }
      </div>
    </div>
  </div>
</div>
